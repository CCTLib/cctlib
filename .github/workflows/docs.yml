name: docs

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  # Allow manual runs from the Actions UI.
  workflow_dispatch:

# Only one Pages deploy in flight; queue skipped runs are wasted.
concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    name: doxygen build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install doxygen + graphviz
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen graphviz

      - name: Version banner
        run: |
          doxygen --version
          dot -V

      - name: Run doxygen
        run: doxygen docs/Doxyfile

      - name: Ensure docs were produced
        run: test -s docs/output/html/index.html

      - name: Add .nojekyll
        run: touch docs/output/html/.nojekyll

      - name: Deploy to gh-pages branch
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/output/html
          publish_branch: gh-pages

# One-time setup on the repo:
#   Settings -> Pages -> Source: "Deploy from a branch"
#   Branch: gh-pages, folder: / (root)
# After the first successful run, docs are served at
# https://cctlib.github.io/cctlib/
